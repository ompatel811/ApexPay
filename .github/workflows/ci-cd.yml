name: ApexPay CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payment_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Mahipatel2206
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd backend
          mvn clean compile

      - name: Run Backend Unit Tests
        run: |
          cd backend
          mvn test

  frontend-build-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript Type Check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

  docker-validate:
    name: Docker Images Validation
    needs: [backend-build-test, frontend-build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build -t apexpay-backend:test -f docker/backend.Dockerfile backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t apexpay-frontend:test -f docker/frontend.Dockerfile frontend
