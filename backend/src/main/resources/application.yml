spring:
  application:
    name: apexpay-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_platform}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Mahipatel2206}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:25}

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    com.apexpay: DEBUG

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktZm9yLWFwZXhwYXktcGxhdGZvcm0tcHJvZHVjdGlvbi1yZWFkeS1zdGFja2luZw==}
      expiration-ms: 900000 # 15 minutes
      refresh-expiration-ms: 604800000 # 7 days
