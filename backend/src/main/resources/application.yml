spring:
  application:
    name: apexpay-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    com.apexpay: DEBUG

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktZm9yLWFwZXhwYXktcGxhdGZvcm0tcHJvZHVjdGlvbi1yZWFkeS1zdGFja2luZw==}
      expiration-ms: 900000 # 15 minutes
      refresh-expiration-ms: 604800000 # 7 days
