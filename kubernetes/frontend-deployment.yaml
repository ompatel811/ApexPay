apiVersion: apps/v1
kind: Deployment
metadata:
  name: apexpay-frontend
  labels:
    app: apexpay-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apexpay-frontend
  template:
    metadata:
      labels:
        app: apexpay-frontend
    spec:
      containers:
        - name: frontend
          image: apexpay-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: apexpay-config
                  key: next-public-api-url
          resources:
            limits:
              cpu: 800m
              memory: 1Gi
            requests:
              cpu: 400m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: apexpay-frontend
spec:
  selector:
    app: apexpay-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
