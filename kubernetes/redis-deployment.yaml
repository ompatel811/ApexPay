apiVersion: apps/v1
kind: Deployment
metadata:
  name: apexpay-redis
  labels:
    app: apexpay-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apexpay-redis
  template:
    metadata:
      labels:
        app: apexpay-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: apexpay-redis
spec:
  selector:
    app: apexpay-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
